schema_version: 1

context:
  version: "2026.6.1"
  python_min: '3.10'

package:
  name: scikit-hep
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/scikit-hep/scikit_hep-${{ version }}.tar.gz
  sha256: ea3f81f7b4995f705e31d5a8d0b6ed8a01457ffb2612aa6f06ad87a3ce5510da

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools >=62.6
  run:
    - python >=${{ python_min }}
    - awkward ~=2.9.0
    - decaylanguage ~=0.20.0
    - hepstats ~=0.9.0
    - hepunits ~=2.4.0
    - hist ~=2.10.0
    - histoprint ~=2.6.0
    - iminuit ~=2.32.0
    - matplotlib-base >3.4.0
    - mplhep ~=1.2.0
    - numpy >=1.13.1
    - particle ~=0.26.0
    - pylhe ~=1.0.0
    - resample ~=1.10.0
    - uproot ~=5.7.0
    - vector ~=1.8.0

tests:
  - python:
      imports:
        - skhep
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Metapackage of Scikit-HEP project tools for Particle Physics.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/scikit-hep/scikit-hep/
  repository: https://github.com/scikit-hep/scikit-hep/

extra:
  recipe-maintainers:
    - matthewfeickert
    - chrisburr
    - eduardo-rodrigues
    - henryiii
